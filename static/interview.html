<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Session - JobGenie</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        .interview-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .interview-header {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #1a1a24 0%, #0f0f15 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-left h2 {
            font-size: 1.5em;
            margin: 0;
            color: #ffffff;
        }
        .timer {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .end-interview-btn, .new-interview-btn {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            border: 2px solid rgba(139, 92, 246, 0.5);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .end-interview-btn:hover {
            background: rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(139, 92, 246, 0.3);
        }
        .new-interview-btn {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
        }
        .new-interview-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }
        .video-interview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            flex: 1;
            overflow: hidden;
        }
        .transcript-panel {
            display: flex;
            flex-direction: column;
            background: #1a1a24;
            border-right: 2px solid rgba(139, 92, 246, 0.2);
            overflow: hidden;
        }
        .transcript-header {
            padding: 15px 20px;
            background: #0f0f15;
            border-bottom: 2px solid rgba(139, 92, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .transcript-header h3 {
            margin: 0;
            color: #8b5cf6;
            font-size: 1.2em;
        }
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .mic-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mic-btn:hover {
            background: #e0e0e0;
            transform: scale(1.1);
        }
        .mic-btn.active {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }
        .mic-btn svg {
            width: 20px;
            height: 20px;
        }
        .mic-status {
            font-size: 0.9em;
            color: #999;
            font-weight: 600;
        }
        .transcript-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #1a1a24;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user {
            justify-content: flex-end;
        }
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .message.assistant .message-content {
            background: #0f0f15;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-bottom-left-radius: 5px;
            color: #ffffff;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message-label {
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        .transcript-input-container {
            display: flex;
            padding: 15px 20px;
            background: #0f0f15;
            border-top: 2px solid rgba(139, 92, 246, 0.2);
            gap: 10px;
        }
        .transcript-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
            background: #1a1a24;
            color: #ffffff;
        }
        .transcript-input:focus {
            border-color: #8b5cf6;
        }
        .send-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.1);
        }
        .send-btn svg {
            width: 24px;
            height: 24px;
        }
        .video-panel {
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
            overflow: hidden;
        }
        .video-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
        }
        .video-header h3 {
            margin: 0;
            font-size: 1.2em;
        }
        .video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }
        .user-camera {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #8b5cf6;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            z-index: 10;
        }
        .user-camera video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        .camera-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(139, 92, 246, 0.9);
            color: white;
            padding: 5px;
            text-align: center;
            font-size: 0.8em;
            font-weight: 600;
        }
        .jobgenie-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: transform 0.3s;
            position: relative;
        }
        .jobgenie-avatar.speaking {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        /* Akinator-style Turban */
        .avatar-turban {
            width: 220px;
            height: 80px;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 50%, #2e5f8a 100%);
            border-radius: 50px 50px 0 0;
            position: relative;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            z-index: 3;
        }
        .avatar-turban::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.5);
        }
        /* Akinator-style Face */
        .avatar-face {
            width: 200px;
            height: 180px;
            background: linear-gradient(135deg, #d4a574 0%, #c49464 50%, #b88454 100%);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 10px 30px rgba(180, 132, 84, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            z-index: 2;
        }
        .avatar-eyes {
            display: flex;
            gap: 35px;
            margin-top: 10px;
        }
        .eye {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            position: relative;
            animation: blink 3s infinite;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        @keyframes blink {
            0%, 90%, 100% {
                height: 35px;
            }
            95% {
                height: 5px;
            }
        }
        .eye::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .eye::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 25%;
            left: 30%;
            opacity: 0.8;
        }
        .jobgenie-avatar.speaking .eye {
            animation: blink 1s infinite;
        }
        /* Akinator-style Nose */
        .avatar-nose {
            width: 20px;
            height: 25px;
            border: 2px solid rgba(180, 132, 84, 0.5);
            border-top: none;
            border-radius: 0 0 15px 15px;
            margin-top: 8px;
        }
        /* Akinator-style Mouth */
        .avatar-mouth {
            width: 50px;
            height: 25px;
            border: 3px solid #8b5a3c;
            border-top: none;
            border-radius: 0 0 50px 50px;
            margin-top: 10px;
            transition: height 0.3s;
            background: rgba(139, 90, 60, 0.2);
        }
        .jobgenie-avatar.speaking .avatar-mouth {
            animation: talk 0.5s ease-in-out infinite;
        }
        @keyframes talk {
            0%, 100% {
                height: 25px;
            }
            50% {
                height: 35px;
            }
        }
        /* Akinator-style Beard */
        .avatar-beard {
            width: 180px;
            height: 100px;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f08 100%);
            border-radius: 0 0 90px 90px;
            position: relative;
            margin-top: -10px;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .avatar-beard::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 20px;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f08 100%);
            border-radius: 0 0 30px 30px;
        }
        .avatar-body {
            margin-top: 20px;
            text-align: center;
        }
        .avatar-name {
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .speaking-indicator {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
        }
        .speaking-indicator span {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: speaking 1.4s infinite;
        }
        .speaking-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .speaking-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes speaking {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        .video-controls {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .camera-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .camera-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        .camera-btn.active {
            background: #4caf50;
            border-color: #4caf50;
        }
        .camera-btn svg {
            width: 22px;
            height: 22px;
        }
        .camera-status {
            color: white;
            font-size: 0.9em;
            font-weight: 600;
        }
        .typing-indicator {
            display: inline-block;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        .transcript-messages::-webkit-scrollbar {
            width: 8px;
        }
        .transcript-messages::-webkit-scrollbar-track {
            background: #0f0f15;
        }
        .transcript-messages::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 4px;
        }
        .transcript-messages::-webkit-scrollbar-thumb:hover {
            background: #6366f1;
        }
        .feedback-section {
            padding: 30px;
            background: #1a1a24;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            display: none;
        }
        .feedback-container {
            max-width: 900px;
            margin: 0 auto;
            background: #1a1a24;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .feedback-container h2 {
            color: #8b5cf6;
            margin-bottom: 30px;
            text-align: center;
        }
        .feedback-header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border-radius: 15px;
            color: white;
        }
        .score-circle {
            text-align: center;
        }
        .score-value {
            font-size: 3em;
            font-weight: bold;
            line-height: 1;
        }
        .score-label {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 5px;
        }
        .interview-info {
            font-size: 1.1em;
        }
        .feedback-section-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #1a1a24;
            border-radius: 10px;
            border-left: 4px solid #8b5cf6;
        }
        .feedback-section-item h3 {
            color: #8b5cf6;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .feedback-section-item ul {
            list-style: none;
            padding: 0;
        }
        .feedback-section-item ul li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            color: #b0b0b0;
        }
        .feedback-section-item ul li:last-child {
            border-bottom: none;
        }
        .feedback-section-item ul li:before {
            content: "•";
            color: #8b5cf6;
            font-weight: bold;
            position: absolute;
            left: 0;
            font-size: 1.5em;
            line-height: 0.8;
        }
        .feedback-section-item p {
            line-height: 1.6;
            color: #b0b0b0;
        }
        .feedback-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        @media (max-width: 768px) {
            .video-interview-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            .user-camera {
                width: 150px;
                height: 112px;
                top: 10px;
                right: 10px;
            }
            .avatar-turban {
                width: 165px;
                height: 60px;
            }
            .avatar-face {
                width: 150px;
                height: 135px;
            }
            .avatar-beard {
                width: 135px;
                height: 75px;
            }
            .eye {
                width: 26px;
                height: 26px;
            }
            .eye::after {
                width: 15px;
                height: 15px;
            }
            .header-left {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .header-buttons {
                flex-direction: column;
            }
            .end-interview-btn,
            .new-interview-btn {
                width: 100%;
            }
            .feedback-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="interview-container">
        <div class="interview-header">
            <div class="header-left">
                <h2>Interview Session with JobGenie</h2>
                <div class="timer" id="timer">05:00</div>
            </div>
            <div class="header-buttons">
                <button class="end-interview-btn" onclick="endInterview()">End Interview & Get Feedback</button>
                <button class="new-interview-btn" onclick="resetInterview()">New Interview</button>
            </div>
        </div>
        
        <div class="video-interview-container">
            <!-- Left Side: Transcripts/Chat -->
            <div class="transcript-panel">
                <div class="transcript-header">
                    <h3>Live Transcript</h3>
                    <div class="audio-controls">
                        <button class="mic-btn" id="micBtn" onclick="toggleMicrophone()" title="Toggle Microphone">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                        <span class="mic-status" id="micStatus">Mic Off</span>
                    </div>
                </div>
                <div class="feedback-section" id="feedbackSection">
                    <!-- Feedback will be displayed here -->
                </div>
                <div class="transcript-messages" id="chatMessages">
                    <!-- Messages will be added here dynamically -->
                </div>
                <div class="transcript-input-container">
                    <input 
                        type="text" 
                        id="chatInput" 
                        class="transcript-input" 
                        placeholder="Type your answer or use microphone..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="send-btn" onclick="sendMessage()" title="Send Message">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Right Side: Video/Avatar -->
            <div class="video-panel">
                <div class="video-header">
                    <h3>JobGenie</h3>
                </div>
                <div class="video-container">
                    <!-- User Camera View -->
                    <div class="user-camera" id="userCameraContainer" style="display: none;">
                        <video id="userVideo" autoplay playsinline></video>
                        <div class="camera-label">You</div>
                    </div>
                    
                    <!-- Akinator-style Avatar -->
                    <div class="jobgenie-avatar" id="jobgenieAvatar">
                        <div class="avatar-turban"></div>
                        <div class="avatar-face">
                            <div class="avatar-eyes">
                                <div class="eye left-eye"></div>
                                <div class="eye right-eye"></div>
                            </div>
                            <div class="avatar-nose"></div>
                            <div class="avatar-mouth"></div>
                        </div>
                        <div class="avatar-beard"></div>
                        <div class="avatar-body">
                            <div class="avatar-name">JobGenie</div>
                            <div class="speaking-indicator" id="speakingIndicator" style="display: none;">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="video-controls">
                    <button class="camera-btn" id="cameraBtn" onclick="toggleCamera()" title="Toggle Camera">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                    </button>
                    <span class="camera-status" id="cameraStatus">Camera Off</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let sessionId = null;
        let interviewTimer = null;
        let statusCheckInterval = null;
        let resumeUploaded = false;

        // Speech Recognition and Text-to-Speech
        let recognition = null;
        let isListening = false;
        let userStream = null;
        let synth = window.speechSynthesis;
        let currentUtterance = null;

        // Initialize Speech Recognition
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                
                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    let finalTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    
                    const chatInput = document.getElementById('chatInput');
                    if (interimTranscript) {
                        chatInput.value = interimTranscript;
                    }
                    
                    if (finalTranscript.trim()) {
                        chatInput.value = finalTranscript.trim();
                        sendMessage();
                    }
                };
                
                recognition.onerror = function(event) {
                    console.error('Speech recognition error:', event.error);
                    if (event.error === 'no-speech' && isListening) {
                        recognition.start();
                    }
                };
                
                recognition.onend = function() {
                    if (isListening) {
                        recognition.start();
                    }
                };
            }
        }

        // Initialize on page load
        initSpeechRecognition();

        // Load session from localStorage
        window.addEventListener('DOMContentLoaded', async function() {
            sessionId = localStorage.getItem('interviewSessionId');
            
            if (!sessionId) {
                alert('No interview session found. Please start from the dashboard.');
                window.location.href = '/dashboard';
                return;
            }

            resumeUploaded = true;
            
            // Check if interview was already started and get initial question
            try {
                const statusResponse = await fetch(`${API_BASE_URL}/interview/status?session_id=${sessionId}`);
                const statusData = await statusResponse.json();
                
                if (statusData.started) {
                    // Display initial question if available
                    if (statusData.initial_question) {
                        addMessage('assistant', statusData.initial_question);
                        speakText(statusData.initial_question);
                    } else {
                        addMessage('assistant', 'Welcome! Let\'s begin the interview.');
                    }
                } else {
                    // This shouldn't happen if upload was successful, but handle it gracefully
                    addMessage('assistant', 'Please wait while we prepare your interview...');
                }
                
                startInterviewTimer();
                requestMediaPermissions();
            } catch (error) {
                console.error('Error checking interview status:', error);
                // If status check fails, the interview should still work
                addMessage('assistant', 'Welcome! The interview is ready to begin.');
                startInterviewTimer();
                requestMediaPermissions();
            }
        });

        // Send message function
        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const message = chatInput.value.trim();
            
            if (!message || !sessionId) return;
            
            addMessage('user', message);
            chatInput.value = '';
            
            const typingId = showTypingIndicator();
            
            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                removeTypingIndicator(typingId);
                
                if (response.ok && data.success) {
                    addMessage('assistant', data.response);
                    speakText(data.response);
                } else {
                    addMessage('assistant', 'Error: ' + (data.error || 'Failed to get response'));
                }
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Error connecting to server: ' + error.message);
            }
        }

        // Add message to chat
        function addMessage(role, content) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const label = role === 'user' ? 'You' : 'JobGenie';
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const labelDiv = document.createElement('div');
            labelDiv.className = 'message-label';
            labelDiv.textContent = label;
            
            const contentDiv = document.createElement('div');
            contentDiv.textContent = content;
            
            messageContent.appendChild(labelDiv);
            messageContent.appendChild(contentDiv);
            messageDiv.appendChild(messageContent);
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const labelDiv = document.createElement('div');
            labelDiv.className = 'message-label';
            labelDiv.textContent = 'JobGenie';
            
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<span></span><span></span><span></span>';
            
            messageContent.appendChild(labelDiv);
            messageContent.appendChild(typingIndicator);
            typingDiv.appendChild(messageContent);
            
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return 'typing-indicator';
        }

        // Remove typing indicator
        function removeTypingIndicator(id) {
            const indicator = document.getElementById(id);
            if (indicator) {
                indicator.remove();
            }
        }

        // Handle Enter key press
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Start interview timer
        function startInterviewTimer() {
            if (statusCheckInterval) {
                clearInterval(statusCheckInterval);
            }
            
            statusCheckInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/interview/status?session_id=${sessionId}`);
                    const data = await response.json();
                    
                    if (data.started) {
                        const minutes = Math.floor(data.remaining_seconds / 60);
                        const seconds = data.remaining_seconds % 60;
                        const timerDisplay = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                        document.getElementById('timer').textContent = timerDisplay;
                        
                        const timerEl = document.getElementById('timer');
                        if (data.remaining_seconds < 60) {
                            timerEl.style.color = '#ff4444';
                        } else if (data.remaining_seconds < 120) {
                            timerEl.style.color = '#ffaa00';
                        } else {
                            timerEl.style.color = '#fff';
                        }
                        
                        if (data.is_complete) {
                            clearInterval(statusCheckInterval);
                            endInterview();
                        }
                    }
                } catch (error) {
                    console.error('Error checking interview status:', error);
                }
            }, 1000);
        }

        // End interview and get feedback
        async function endInterview() {
            if (statusCheckInterval) {
                clearInterval(statusCheckInterval);
            }
            
            stopMediaStreams();
            
            document.getElementById('chatInput').disabled = true;
            const sendBtn = document.querySelector('.send-btn');
            if (sendBtn) sendBtn.disabled = true;
            
            addMessage('assistant', 'Interview completed. Generating your feedback...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/interview/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    displayFeedback(data.feedback);
                } else {
                    addMessage('assistant', 'Error generating feedback: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                addMessage('assistant', 'Error connecting to server: ' + error.message);
            }
        }

        // Display feedback
        function displayFeedback(feedback) {
            const feedbackSection = document.getElementById('feedbackSection');
            const chatMessages = document.getElementById('chatMessages');
            
            chatMessages.style.display = 'none';
            const inputContainer = document.querySelector('.transcript-input-container');
            if (inputContainer) inputContainer.style.display = 'none';
            feedbackSection.style.display = 'block';
            
            feedbackSection.innerHTML = `
                <div class="feedback-container">
                    <h2>Interview Feedback</h2>
                    <div class="feedback-header">
                        <div class="score-circle">
                            <div class="score-value">${feedback.total_score}</div>
                            <div class="score-label">/ 100</div>
                        </div>
                        <div class="interview-info">
                            <p><strong>Duration:</strong> ${feedback.interview_duration_minutes} minutes</p>
                        </div>
                    </div>
                    
                    <div class="feedback-section-item">
                        <h3>Overall Feedback</h3>
                        <p>${feedback.overall_feedback || 'No overall feedback available.'}</p>
                    </div>
                    
                    <div class="feedback-grid">
                        <div class="feedback-section-item">
                            <h3>Strengths</h3>
                            <ul>
                                ${feedback.strengths ? feedback.strengths.map(s => `<li>${s}</li>`).join('') : '<li>No strengths listed</li>'}
                            </ul>
                        </div>
                        
                        <div class="feedback-section-item">
                            <h3>Weaknesses</h3>
                            <ul>
                                ${feedback.weaknesses ? feedback.weaknesses.map(w => `<li>${w}</li>`).join('') : '<li>No weaknesses listed</li>'}
                            </ul>
                        </div>
                    </div>
                    
                    <div class="feedback-section-item">
                        <h3>Areas of Improvement</h3>
                        <ul>
                            ${feedback.areas_of_improvement ? feedback.areas_of_improvement.map(a => `<li>${a}</li>`).join('') : '<li>No areas listed</li>'}
                        </ul>
                    </div>
                    
                    <div class="feedback-grid">
                        <div class="feedback-section-item">
                            <h3>Technical Assessment</h3>
                            <p>${feedback.technical_assessment || 'No technical assessment available.'}</p>
                        </div>
                        
                        <div class="feedback-section-item">
                            <h3>Communication Assessment</h3>
                            <p>${feedback.communication_assessment || 'No communication assessment available.'}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Reset interview
        function resetInterview() {
            if (confirm('Are you sure you want to start a new interview? This will clear the current session.')) {
                if (statusCheckInterval) {
                    clearInterval(statusCheckInterval);
                }
                localStorage.removeItem('interviewSessionId');
                localStorage.removeItem('candidateDetails');
                window.location.href = '/candidate-details';
            }
        }

        // Text-to-Speech function
        function speakText(text) {
            if (currentUtterance) {
                synth.cancel();
            }
            
            let speechText = text;
            if (speechText.toLowerCase().includes('jobgenie')) {
                const parts = speechText.split(/[.!?]/);
                speechText = parts.filter(p => !p.toLowerCase().includes('jobgenie')).join('. ').trim();
                if (!speechText) {
                    speechText = text;
                }
            }
            
            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            const speakingIndicator = document.getElementById('speakingIndicator');
            speakingIndicator.style.display = 'flex';
            document.getElementById('jobgenieAvatar').classList.add('speaking');
            
            utterance.onend = function() {
                speakingIndicator.style.display = 'none';
                document.getElementById('jobgenieAvatar').classList.remove('speaking');
                currentUtterance = null;
            };
            
            utterance.onerror = function() {
                speakingIndicator.style.display = 'none';
                document.getElementById('jobgenieAvatar').classList.remove('speaking');
                currentUtterance = null;
            };
            
            currentUtterance = utterance;
            synth.speak(utterance);
        }

        // Toggle Microphone
        function toggleMicrophone() {
            if (!recognition) {
                alert('Speech recognition is not supported in your browser. Please use Chrome or Edge.');
                return;
            }
            
            const micBtn = document.getElementById('micBtn');
            const micStatus = document.getElementById('micStatus');
            
            if (isListening) {
                recognition.stop();
                isListening = false;
                micBtn.classList.remove('active');
                micStatus.textContent = 'Mic Off';
                micStatus.style.color = '#999';
            } else {
                try {
                    recognition.start();
                    isListening = true;
                    micBtn.classList.add('active');
                    micStatus.textContent = 'Mic On';
                    micStatus.style.color = '#4caf50';
                } catch (error) {
                    console.error('Error starting recognition:', error);
                    alert('Error starting microphone. Please check permissions.');
                }
            }
        }

        // Toggle Camera
        async function toggleCamera() {
            const cameraBtn = document.getElementById('cameraBtn');
            const cameraStatus = document.getElementById('cameraStatus');
            const userCameraContainer = document.getElementById('userCameraContainer');
            const userVideo = document.getElementById('userVideo');
            
            if (userStream) {
                userStream.getTracks().forEach(track => track.stop());
                userStream = null;
                userCameraContainer.style.display = 'none';
                cameraBtn.classList.remove('active');
                cameraStatus.textContent = 'Camera Off';
                cameraStatus.style.color = '#999';
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: false 
                    });
                    userStream = stream;
                    userVideo.srcObject = stream;
                    userCameraContainer.style.display = 'block';
                    cameraBtn.classList.add('active');
                    cameraStatus.textContent = 'Camera On';
                    cameraStatus.style.color = '#4caf50';
                } catch (error) {
                    console.error('Error accessing camera:', error);
                    alert('Error accessing camera. Please check permissions.');
                }
            }
        }

        // Request Media Permissions
        async function requestMediaPermissions() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (error) {
                console.log('Media permissions not granted:', error);
            }
        }

        // Stop all media streams
        function stopMediaStreams() {
            if (recognition && isListening) {
                recognition.stop();
                isListening = false;
            }
            
            if (synth.speaking) {
                synth.cancel();
            }
            
            if (userStream) {
                userStream.getTracks().forEach(track => track.stop());
                userStream = null;
            }
            
            document.getElementById('micBtn').classList.remove('active');
            document.getElementById('micStatus').textContent = 'Mic Off';
            document.getElementById('micStatus').style.color = '#999';
            document.getElementById('cameraBtn').classList.remove('active');
            document.getElementById('cameraStatus').textContent = 'Camera Off';
            document.getElementById('cameraStatus').style.color = '#999';
            document.getElementById('userCameraContainer').style.display = 'none';
            document.getElementById('speakingIndicator').style.display = 'none';
            document.getElementById('jobgenieAvatar').classList.remove('speaking');
        }
    </script>
</body>
</html>
